name: SezzleCheckoutExample
options:
  bundleIdPrefix: com.sezzle.example
  deploymentTarget:
    iOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
packages:
  SezzleMerchantSDK:
    path: ../
targets:
  SezzleCheckoutExample:
    type: application
    platform: iOS
    sources:
      - SezzleCheckoutExample
    dependencies:
      - package: SezzleMerchantSDK
    info:
      path: SezzleCheckoutExample/Info.plist
